{{- $monitoring := .Values.monitoring | default dict -}}
{{- $serviceMonitor := $monitoring.serviceMonitor | default dict -}}
{{- $grafanaDashboard := $monitoring.grafanaDashboard | default dict -}}
{{- if ($serviceMonitor.enabled | default false) }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: client
  namespace: {{ default (include "fuse-cache.namespace" .) $serviceMonitor.namespace }}
  labels:
    app: client
    {{- with $serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app: client
  namespaceSelector:
    matchNames:
      - {{ include "fuse-cache.namespace" . }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ $serviceMonitor.interval | default "15s" }}
      scrapeTimeout: {{ $serviceMonitor.scrapeTimeout | default "10s" }}
{{- end }}
{{- if ($grafanaDashboard.enabled | default false) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fuse-cache-dashboard
  namespace: {{ default (include "fuse-cache.namespace" .) $grafanaDashboard.namespace }}
  labels:
    app: client
    {{- with $grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  fuse-cache-overview.json: |
{{ .Files.Get "dashboards/fuse-cache-overview.json" | indent 4 }}
{{- end }}
